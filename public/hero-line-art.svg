<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b4a"/>
      <stop offset="50%" style="stop-color:#2a3f5f"/>
      <stop offset="100%" style="stop-color:#1a2b4a"/>
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- LEFT BOOK - Open book with pages -->
  <g opacity="0.3">
    <!-- Left page -->
    <path d="M 350 350 L 350 700 Q 350 720, 370 720 L 550 720 Q 570 720, 570 700 L 570 350 Q 520 320, 460 350 Z" 
          stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M 570 350 Q 630 320, 680 350 L 680 700 Q 680 720, 660 720 L 480 720 Q 460 720, 460 700 Z" 
          stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Book spine curve -->
    <path d="M 460 350 Q 515 330, 570 350" stroke="#d4af37" stroke-width="3" fill="none"/>
    <!-- Page lines -->
    <line x1="380" y1="400" x2="540" y2="400" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="380" y1="450" x2="540" y2="450" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="380" y1="500" x2="540" y2="500" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="590" y1="400" x2="650" y2="400" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="590" y1="450" x2="650" y2="450" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="590" y1="500" x2="650" y2="500" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- VS BADGE in Center -->
  <g opacity="0.35">
    <circle cx="960" cy="540" r="100" stroke="#d4af37" stroke-width="4" fill="none"/>
    <circle cx="960" cy="540" r="85" stroke="#f4d03f" stroke-width="2" fill="none"/>
    <text x="960" y="570" font-family="Arial" font-size="56" font-weight="bold" fill="#d4af37" text-anchor="middle">VS</text>
    <!-- Decorative stars around VS -->
    <text x="920" y="500" font-size="24" fill="#f4d03f">★</text>
    <text x="1000" y="500" font-size="24" fill="#f4d03f">★</text>
    <text x="920" y="600" font-size="24" fill="#f4d03f">★</text>
    <text x="1000" y="600" font-size="24" fill="#f4d03f">★</text>
  </g>
  
  <!-- RIGHT BOOK - Open book with pages -->
  <g opacity="0.3">
    <!-- Left page -->
    <path d="M 1240 350 L 1240 700 Q 1240 720, 1260 720 L 1440 720 Q 1460 720, 1460 700 L 1460 350 Q 1410 320, 1350 350 Z" 
          stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M 1460 350 Q 1520 320, 1570 350 L 1570 700 Q 1570 720, 1550 720 L 1370 720 Q 1350 720, 1350 700 Z" 
          stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Book spine curve -->
    <path d="M 1350 350 Q 1405 330, 1460 350" stroke="#d4af37" stroke-width="3" fill="none"/>
    <!-- Page lines -->
    <line x1="1270" y1="400" x2="1430" y2="400" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="1270" y1="450" x2="1430" y2="450" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="1270" y1="500" x2="1430" y2="500" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="1480" y1="400" x2="1540" y2="400" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="1480" y1="450" x2="1540" y2="450" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <line x1="1480" y1="500" x2="1540" y2="500" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Connecting flow lines from books to VS -->
  <path d="M 680 450 Q 820 470, 860 540" stroke="#d4af37" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="5,5"/>
  <path d="M 1240 450 Q 1100 470, 1060 540" stroke="#d4af37" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="5,5"/>
  
  <!-- Decorative floating book icons -->
  <text x="250" y="280" font-size="40" fill="#f4d03f" opacity="0.2">📖</text>
  <text x="1620" y="280" font-size="40" fill="#f4d03f" opacity="0.2">📚</text>
  <text x="200" y="800" font-size="36" fill="#d4af37" opacity="0.2">📕</text>
  <text x="1670" y="800" font-size="36" fill="#d4af37" opacity="0.2">📗</text>
</svg>
